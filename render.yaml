services:
  - type: web
    name: finguard-api
    runtime: python
    rootDir: apps/api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: AUTH_REQUIRED
        value: true
      - key: PUBLIC_CUSTOMER_CHAT
        value: false
      - key: LLM_PROVIDER
        value: mock
      - key: RATE_LIMIT_PER_MINUTE
        value: 60
      - key: CORS_ORIGINS
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
